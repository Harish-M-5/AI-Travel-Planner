```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI  Travel Planner</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="hero">

        <h1>✈️ AI Travel Planners</h1>

        <p>
            Plan your perfect trip using AI.
            Enter your travel details and receive a personalized travel plan.
        </p>

    </header>

    <!-- Main -->
    <main class="container">

        <!-- Input Form -->
        <section class="form-card">

            <h2>Travel Details</h2>

            <form id="travelForm">

                <!-- Destination -->
                <div class="input-group">

                    <label for="destination">
                        Destination
                    </label>

                    <input
                        type="text"
                        id="destination"
                        placeholder="Enter a place name"
                        required
                    >

                </div>

                <!-- Budget -->
                <div class="input-group">

                    <label for="budget">
                        Budget (₹)
                    </label>

                    <input
                        type="number"
                        id="budget"
                        placeholder="Enter your budget"
                        required
                    >

                </div>

                <!-- Days -->
                <div class="input-group">

                    <label for="days">
                        Number of Days
                    </label>

                    <input
                        type="number"
                        id="days"
                        placeholder="Enter number of days"
                        min="1"
                        required
                    >

                </div>

                <!-- Trip Type -->
                <div class="input-group">

                    <label for="tripType">
                        Trip Type
                    </label>

                    <select id="tripType">

                        <option>Couple</option>

                        <option>Friends</option>

                        <option>Family</option>

                        <option>Solo</option>

                    </select>

                </div>

                <!-- Travel Mode -->
                <div class="input-group">

                    <label for="travelMode">
                        Travel Mode
                    </label>

                    <select id="travelMode">

                        <option>Train</option>

                        <option>Bus</option>

                        <option>Flight</option>

                        <option>Car</option>

                    </select>

                </div>

                <!-- Button -->
                <button type="submit" id="generateBtn">

                    ✨ Generate AI Travel Plan

                </button>

            </form>

        </section>

        <!-- Output -->
        <section class="result-card">

            <h2>Your AI Travel Plan</h2>

            <div id="result">

                <p class="placeholder">

                    Your personalized travel itinerary will appear here.

                </p>

            </div>

        </section>

    </main>

    <!-- Footer -->
    <footer>

        <p>

            © 2026 AI  Travel Planner | Developed by Harish

        </p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
```
